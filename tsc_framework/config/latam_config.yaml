    delay: 0.4
    gini: 0.15
    cvar: 0.2
    queue_length: 0.25

training:
  total_timesteps: 100000
  n_envs: 1
  seed: 42

latam_features:
  enable_traci_chaos: true
  lateral_resolution: 0.5
