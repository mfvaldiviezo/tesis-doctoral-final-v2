network:
  benchmark:
    network_file: sumo_configs/hangzhou/hangzhou_pedestrian.net.xml
    route_files_dir: experiments/hangzhou_robustness/scenarios
    route_file: experiments/hangzhou_robustness/scenarios/latam_imprudent_drivers.rou.xml
    tls_id: B1

sumo:
