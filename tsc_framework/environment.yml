name: tsc-env
channels:
  - conda-forge
  - defaults

dependencies:
  # ── Core Python ──────────────────────────────────────────────────────────────
  - python=3.10

  # ── Ciencia de Datos & Procesamiento ─────────────────────────────────────────
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.12

  # ── Entorno de Aprendizaje por Refuerzo ──────────────────────────────────────
  - gymnasium>=0.29             # API Gym moderna (sucesor de OpenAI Gym)

  # ── PyTorch (conda-forge) ─────────────────────────────────────────────────
  # Con GPU NVIDIA: reemplaza 'pytorch' por 'pytorch-gpu' o instala desde
  # https://pytorch.org/get-started/locally/ después de activar el entorno
  - pytorch>=2.1                # Backend de PyTorch para SB3

  # ── Configuración y Utilidades ───────────────────────────────────────────────
  - pyyaml>=6.0
  - tqdm>=4.65
  - rich>=13.0                  # Logs y tablas bonitas en terminal
  - python-dotenv>=1.0          # Manejo de variables de entorno desde .env

  # ── Testing ───────────────────────────────────────────────────────────────────
  - pytest>=7.4
  - pytest-cov>=4.1

  # ── Jupyter (exploración y análisis) ─────────────────────────────────────────
  - jupyterlab>=4.0
  - ipykernel>=6.25

  # ── Instalaciones vía pip ────────────────────────────────────────────────────
  # NOTA: eclipse-sumo, traci y sumolib solo existen en PyPI (NO en conda).
  #       Se instalan aquí con la versión más reciente disponible (1.26.x).
  - pip
  - pip:
    # Simulación de Tráfico (PyPI-only)
    - eclipse-sumo==1.26.0      # Binarios de SUMO (versión más reciente)
    - traci==1.26.0             # API TraCI para control en tiempo real
    - sumolib==1.26.0           # Librería para leer redes .net.xml
    # Algoritmos RL
    - stable-baselines3>=2.2.1  # PPO, SAC, TD3 listos para usar
    # Módulo probabilístico
    - pyvinecopulib>=0.6.3      # Vine Copulas para generación de escenarios
    # Explicabilidad
    - shap>=0.44                # Explicabilidad de modelos RL
    # Monitoreo
    - tensorboard>=2.14         # Monitoreo de entrenamiento
    # Paquete local
    - -e .                      # Instalación editable del paquete tsc_framework
